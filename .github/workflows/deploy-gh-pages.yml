name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "app-appintoss/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-gh-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Web Bundle
        run: npm run build:web --workspace app-appintoss

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app-appintoss/dist

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
